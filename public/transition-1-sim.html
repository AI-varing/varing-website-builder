<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transition 1</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'BentonSans'; src: url('/fonts/BENTONSANS-BOLD.OTF') format('opentype'); font-weight: 700; }
  @font-face { font-family: 'BentonSans'; src: url('/fonts/BentonSans-Light.otf') format('opentype'); font-weight: 300; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; overflow: hidden; background: #080808; }

  .scene { width: 100%; height: 100%; position: relative; overflow: hidden; }

  /* Ken Burns — slow zoom on aerial photo */
  .bg-img {
    position: absolute; inset: -60px;
    background: url('/we-sell-dirt-bg.png') center/cover no-repeat;
    filter: brightness(0.4) contrast(1.1);
    animation: kenBurns 4s ease-in-out forwards;
  }
  @keyframes kenBurns {
    0% { transform: scale(1.1) translate(0, 0); }
    100% { transform: scale(1.2) translate(-20px, -10px); }
  }

  /* Dark overlays */
  .overlay-1 { position: absolute; inset: 0; background: linear-gradient(to right, rgba(8,8,8,0.85) 0%, rgba(8,8,8,0.4) 50%, rgba(8,8,8,0.85) 100%); }
  .overlay-2 { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,8,8,0.6) 0%, transparent 30%, transparent 70%, rgba(8,8,8,0.6) 100%); }

  /* Cinematic bars */
  .bar-top, .bar-bottom { position: absolute; left: 0; right: 0; height: 60px; background: #000; z-index: 50; }
  .bar-top { top: 0; } .bar-bottom { bottom: 0; }

  /* Center text */
  .text-wrap {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; z-index: 10;
  }

  .stat-number {
    font-family: 'BentonSans', sans-serif;
    font-size: 140px; font-weight: 700; color: #C67A3C;
    line-height: 1; margin-bottom: 28px;
    opacity: 0; transform: scale(0.8);
    animation: popIn 0.8s 0.3s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.8); }
    70% { transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  .stat-label {
    font-family: 'BentonSans', sans-serif;
    font-size: 20px; letter-spacing: 0.4em; text-transform: uppercase;
    color: #F0EAE0; font-weight: 500;
    opacity: 0; transform: translateY(15px);
    animation: fadeUp 0.8s 0.8s cubic-bezier(.22,1,.36,1) forwards;
  }

  /* Horizontal lines that draw across */
  .h-line {
    position: absolute; top: 50%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(198,122,60,0.3), transparent);
    transform: translateY(-50%);
  }
  .h-line-l { left: 0; width: 0; animation: drawRight 1.5s 0.2s ease forwards; }
  .h-line-r { right: 0; width: 0; animation: drawLeft 1.5s 0.2s ease forwards; }
  @keyframes drawRight { to { width: 35%; } }
  @keyframes drawLeft { to { width: 35%; } }

  /* Fade in then out */
  .scene { animation: inOut 4s ease forwards; }
  @keyframes inOut {
    0% { opacity: 0; }
    12% { opacity: 1; }
    82% { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  /* Grain */
  body::after {
    content: ''; position: fixed; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.03; pointer-events: none; z-index: 1000;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="bg-img"></div>
  <div class="overlay-1"></div>
  <div class="overlay-2"></div>
  <div class="bar-top"></div>
  <div class="bar-bottom"></div>
  <div class="h-line h-line-l"></div>
  <div class="h-line h-line-r"></div>
  <div class="text-wrap">
    <p class="stat-number">$55M+</p>
    <p class="stat-label">In Active Court-Ordered Mandates</p>
  </div>
</div>
</body>
</html>
